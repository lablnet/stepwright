<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>StepWright Advanced Demo</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .box {
            border: 1px solid #ccc;
            padding: 20px;
            margin: 10px 0;
        }

        /* Hover */
        #hover-menu {
            display: none;
            background: #eee;
            padding: 10px;
            border: 1px solid #999;
        }

        .hover-area:hover #hover-menu {
            display: block;
        }

        /* Drag and Drop */
        .draggable {
            width: 100px;
            height: 50px;
            background: skyblue;
            cursor: move;
        }

        .dropzone {
            width: 200px;
            height: 100px;
            background: #f0f0f0;
            border: 2px dashed #999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dropzone.over {
            background: #e0e0e0;
        }

        /* Virtual Scroll */
        #virtual-scroll-container {
            height: 200px;
            overflow-y: auto;
            border: 1px solid black;
            position: relative;
        }

        .spacer {
            height: 10000px;
            position: absolute;
            width: 1px;
        }

        .item {
            height: 40px;
            border-bottom: 1px solid #eee;
            padding: 5px;
            box-sizing: border-box;
            background: white;
            width: 100%;
            position: absolute;
        }
    </style>
</head>

<body>
    <h1>StepWright Advanced Demo</h1>

    <div class="box hover-area">
        <h2 id="hover-target">Hover over me</h2>
        <div id="hover-menu">
            <p id="secret-text">Secret content visible only on hover</p>
        </div>
    </div>

    <div class="box">
        <h2>Multi-Select</h2>
        <select id="colors" multiple size="4">
            <option value="red">Red</option>
            <option value="blue">Blue</option>
            <option value="green">Green</option>
            <option value="yellow">Yellow</option>
        </select>
        <p id="selection-result">Selected: None</p>
    </div>

    <div class="box">
        <h2>Drag and Drop</h2>
        <div id="drag-source" class="draggable" draggable="true">Drag me</div>
        <div id="drop-target" class="dropzone">Drop here</div>
        <p id="drag-status">Waiting...</p>
    </div>

    <div class="box">
        <h2>File Upload</h2>
        <input type="file" id="file-input">
        <p id="file-status">No file uploaded</p>
    </div>

    <div class="box">
        <h2>Virtual Scroll</h2>
        <div id="virtual-scroll-container">
            <div class="spacer"></div>
            <div id="visible-items"></div>
        </div>
    </div>

    <div class="box">
        <h2>IFrame Support</h2>
        <iframe src="about:blank" id="test-iframe" style="width: 100%; height: 100px; border: 1px solid red;"></iframe>
    </div>

    <script>
        // Multi-select feedback
        document.getElementById('colors').addEventListener('change', function (e) {
            const selected = Array.from(this.selectedOptions).map(opt => opt.value);
            document.getElementById('selection-result').textContent = 'Selected: ' + selected.join(', ');
        });

        // Drag and Drop
        const source = document.getElementById('drag-source');
        const target = document.getElementById('drop-target');

        source.addEventListener('dragstart', (e) => e.dataTransfer.setData('text/plain', 'dragged'));
        target.addEventListener('dragover', (e) => e.preventDefault());
        target.addEventListener('drop', (e) => {
            e.preventDefault();
            document.getElementById('drag-status').textContent = 'Dropped successfully!';
            target.textContent = 'Received!';
        });

        // File Upload
        document.getElementById('file-input').addEventListener('change', function (e) {
            if (this.files.length > 0) {
                document.getElementById('file-status').textContent = 'Uploaded: ' + this.files[0].name;
            }
        });

        // Virtual Scroll logic
        const container = document.getElementById('virtual-scroll-container');
        const list = document.getElementById('visible-items');
        const itemHeight = 40;
        const totalItems = 1000;

        function updateVirtualList() {
            const scrollTop = container.scrollTop;
            const startIdx = Math.floor(scrollTop / itemHeight);
            const endIdx = startIdx + 6; // visible items

            list.innerHTML = '';
            for (let i = startIdx; i < Math.min(endIdx, totalItems); i++) {
                const item = document.createElement('div');
                item.className = 'item virtual-item';
                item.style.top = (i * itemHeight) + 'px';
                item.innerHTML = `Item <strong>${i}</strong> <span class="id">ID-${i}</span>`;
                list.appendChild(item);
            }
        }
        container.addEventListener('scroll', updateVirtualList);
        updateVirtualList();

        // Fill IFrame
        const iframe = document.getElementById('test-iframe');
        const idoc = iframe.contentWindow.document;
        idoc.open();
        idoc.write(`
            <html>
                <body>
                    <h3>Inside IFrame</h3>
                    <button id="iframe-btn" onclick="this.textContent='Clicked!'">Click me in iframe</button>
                    <input id="iframe-input" placeholder="Type here...">
                </body>
            </html>
        `);
        idoc.close();
    </script>
</body>

</html>
